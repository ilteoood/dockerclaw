name: ZeroClaw

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    outputs:
      tag: ${{ steps.latest_release.outputs.tag }}
    strategy:
      matrix:
        platform:
          - target: aarch64-unknown-linux-musl
          - target: x86_64-unknown-linux-musl
    runs-on: ubuntu-latest
    steps:
      - name: Get latest release
        id: latest_release
        run: |
          TAG=$(curl -sf -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" https://api.github.com/repos/zeroclaw-labs/zeroclaw/releases/latest | jq -r '.tag_name')
          if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
            echo "Failed to fetch latest release tag" >&2
            exit 1
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          repository: zeroclaw-labs/zeroclaw
          ref: ${{ steps.latest_release.outputs.tag }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build web dashboard
        working-directory: web
        run: npm ci && npm run build

      - name: Build binary
        uses: houseabsolute/actions-rust-cross@v1
        with:
          command: build
          target: ${{ matrix.platform.target }}
          args: "--release --locked --feature agent-runtime"
          strip: true
        env:
          CROSS_CONTAINER_OPTS: "-v /var/run/docker.sock:/var/run/docker.sock"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zeroclaw-${{ matrix.platform.target }}
          path: ./target/${{ matrix.platform.target }}/release/zeroclaw
          retention-days: 1

  docker_image:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Build and publish image
        uses: ilteoood/docker_buildx@master
        with:
          tag: latest
          platform: linux/amd64,linux/arm64
          imageName: ilteoood/zeroclaw
          dockerFile: Dockerfile.zeroclaw
          label: version=${{ needs.build.outputs.tag }}
          publish: true
          dockerUser: ilteoood
          dockerPassword: ${{ secrets.DOCKER_HUB_PASSWORD }}

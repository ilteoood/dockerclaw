name: OpenFang

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    outputs:
      tag: ${{ steps.latest_release.outputs.tag }}
    strategy:
      matrix:
        platform:
          - target: aarch64-unknown-linux-gnu
          - target: x86_64-unknown-linux-gnu
    runs-on: ubuntu-latest
    steps:
      - name: Get latest release
        id: latest_release
        run: |
          TAG=$(curl -sf -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" https://api.github.com/repos/RightNow-AI/openfang/releases/latest | jq -r '.tag_name')
          if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
            echo "Failed to fetch latest release tag" >&2
            exit 1
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          repository: RightNow-AI/openfang
          ref: ${{ steps.latest_release.outputs.tag }}

      - name: Build binary
        uses: houseabsolute/actions-rust-cross@v1
        with:
          command: build
          target: ${{ matrix.platform.target }}
          args: "--release --bin openfang"
          strip: true
        env:
          CROSS_CONTAINER_OPTS: "-v /var/run/docker.sock:/var/run/docker.sock"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openfang-${{ matrix.platform.target }}
          path: ./target/${{ matrix.platform.target }}/release/openfang
          retention-days: 1

  docker_image:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ilteoood
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.openfang
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ilteoood/openfang:latest
          labels: version=${{ needs.build.outputs.tag }}
